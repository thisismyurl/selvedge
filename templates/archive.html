<!-- Archive template for Selvedge.
     Category, tag, date, and author archives.
     Extends the index layout with an archive header (title + description)
     above the typographic post list.

     The archive title uses the eyebrow treatment — the category name reads
     as a label above the list, not as a page headline. This matches how
     design publications head their archive pages: "Selected Work / Identity"
     not "Identity Category Archive". -->

<!-- wp:template-part {"slug":"header"} /-->

<!-- wp:group {"tagName":"main","id":"main-content","className":"selvedge-main selvedge-archive","layout":{"type":"constrained","contentSize":"720px"},"style":{"spacing":{"padding":{"top":"var:preset|spacing|12","bottom":"var:preset|spacing|20","left":"var:preset|spacing|5","right":"var:preset|spacing|5"}}}} -->
<main id="main-content" class="wp-block-group selvedge-main selvedge-archive" style="padding-top:var(--wp--preset--spacing--12);padding-bottom:var(--wp--preset--spacing--20);padding-left:var(--wp--preset--spacing--5);padding-right:var(--wp--preset--spacing--5)">

	<div class="wp-block-group selvedge-archive-header" style="padding-bottom:var(--wp--preset--spacing--10);margin-bottom:var(--wp--preset--spacing--10);border-bottom:1px solid var(--wp--preset--color--rule)">

		<!-- Archive label — displays the taxonomy name or "Archives" -->
