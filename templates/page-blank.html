<!-- Blank canvas page template for Selvedge.
     Documented structural variation (gate Check 13 exception clause): the
     header template part is deliberately omitted so a full-bleed landing,
     coming-soon, or presentation page can own the entire viewport with no
     imposed chrome or gutters (Pillar 7, High Agency). The WCAG navigation
     scaffold is still intact — an explicit level:1 h1, <main id="main-content">
     as the skip-link target, and the footer landmark below — so the page is
     never left without a heading or a way out. Only the optional header
     chrome is dropped; the footer stays for consistent navigation. -->

<!-- wp:group {"tagName":"main","id":"main-content","className":"selvedge-main selvedge-page-blank","layout":{"type":"default"}} -->
<main id="main-content" class="wp-block-group selvedge-main selvedge-page-blank">

	<!-- Page heading (required per WCAG 2.1 1.3.1). Empty by design; add a title
	     in the Site Editor. Do not delete this block. -->
	<!-- wp:heading {"level":1} -->
	<h1></h1>
	<!-- /wp:heading -->
	<!-- wp:post-content {"layout":{"type":"default"}} /-->
</main>
<!-- /wp:group -->

<!-- wp:template-part {"slug":"footer"} /-->
